<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Startpage</title>
    <style>
        /* Estilo General */
        body {
            background-color: #0a0a0a; /* Fondo casi negro */
            color: white;
            font-family: 'Courier New', Courier, monospace; /* Toque retro/PC */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor de botones */
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Botones Estilo Minimalista */
        .btn {
            display: block;
            background: transparent;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* Efecto al pasar el mouse */
        .btn:hover {
            background: white;
            color: black;
            letter-spacing: 5px; /* Efecto de estirado leve */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SISTEMA OPERATIVO</h1>
        
        <a href="#" class="btn">TIKTOK</a>
        <a href="#" class="btn">ROBLOX</a>
        <a href="#" class="btn">STEAM</a>
        <a href="#" class="btn">DISCORD</a>
        <a href="#" class="btn">INSTAGRAM</a>
    </div>

</body>
</html>
