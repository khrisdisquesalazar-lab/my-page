<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage Ketoand</title>
    <style>
        /* ESTILO GENERAL (Centrado total y fondo) */
        body {
            /* 1. EL ENLACE CORRECTO DEL GIF */
            background-image: url('https://raw.githubusercontent.com/khrisdisquesalazar-lab/my-page/main/dli7t54-818e2816-ba0c-4e45-88a8-06e37b9d4289.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* 2. CENTRADO PERFECTO DE LOS BOTONES */
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center;     /* Centrado vertical */
            height: 100vh;
            margin: 0;
            overflow: hidden;

            /* Tipografía y color */
            font-family: 'Courier New', Courier, monospace;
            color: white;
            text-align: center;
        }

        /* Capa oscura sobre el GIF (corregida para no romper el centrado) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Oscurece un poco el GIF */
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 400px;
            z-index: 1; /* Para estar por encima del overlay */
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
        }

        /* BOTONES TRANSPARENTES QUE FLOTAN */
        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.05); /* Muy transparente */
            border: 2px solid #ffffff; /* Borde blanco */
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s ease-in-out;
            backdrop-filter: blur(3px); /* Efecto cristal */
            
            /* BRILLO BLANCO (GLOW) */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            
            /* ANIMACIÓN DE FLOTAR SUBIENDO Y BAJANDO */
            animation: float 3s ease-in-out infinite;
        }

        /* Tiempos de animación desfasados para que floten sueltos */
        .btn:nth-of-type(1) { animation-delay: 0.1s; }
        .btn:nth-of-type(2) { animation-delay: 0.3s; }
        .btn:nth-of-type(3) { animation-delay: 0.5s; }
        .btn:nth-of-type(4) { animation-delay: 0.7s; }
        .btn:nth-of-type(5) { animation-delay: 0.9s; }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scaleX(1.1); /* Efecto 'stretched' */
            letter-spacing: 5px;
        }

        /* LÓGICA DE LA ANIMACIÓN (Subir 10px y bajar) */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .telegram-user {
            margin-top: 40px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>SISTEMA OPERATIVO</h1>
        
        <a href="https://www.tiktok.com/@shakalaketo" class="btn">TIKTOK</a>
        <a href="#" class="btn">ROBLOX</a>
        <a href="https://steamcommunity.com/profiles/76561198790173153/" class="btn">STEAM</a>
        <a href="#" class="btn">DISCORD</a>
        <a href="https://t.me/Ketoand" class="btn">TELEGRAM</a>

        <p class="telegram-user">@Ketoand</p>
    </div>

</body>
</html>
