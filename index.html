<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto All Accounts</title>
    <style>
        body {
            /* FONDO DEL GATO */
            background-image: url('https://i.imgur.com/MkEjw6u.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            
            /* CENTRADO PERFECTO */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* CAPA OSCURA PARA QUE SE LEAN LOS BOTONES */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Oscurece el gif un poco */
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: white;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* ESTILO "DROPPED ITEM" (Flotante y transparente) */
        .btn {
            display: block;
            background: rgba(0, 0, 0, 0.5); /* Botón oscuro transparente */
            border: 2px solid #ffffff;
            color: white;
            padding: 15px;
            margin: 20px 0; /* Más espacio entre botones */
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            
            /* Animación de flotar */
            animation: float 3s ease-in-out infinite;
        }

        /* Esto hace que no suban todos al mismo tiempo */
        .btn:nth-child(2) { animation-delay: 0.2s; }
        .btn:nth-child(3) { animation-delay: 0.4s; }
        .btn:nth-child(4) { animation-delay: 0.6s; }
        .btn:nth-child(5) { animation-delay: 0.8s; }
        .btn:nth-child(6) { animation-delay: 1s; }

        .btn:hover {
            background: white;
            color: black;
            transform: scaleX(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        /* LÓGICA DE FLOTACIÓN */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); } /* Sube un poco más */
        }

        .telegram-user {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KETO ALL ACCOUNTS</h1>
        
        <a href="https://www.tiktok.com/@shakalaketo" class="btn">TIKTOK</a>
        <a href="#" class="btn">ROBLOX</a>
        <a href="https://steamcommunity.com/profiles/76561198790173153/" class="btn">STEAM</a>
        <a href="#" class="btn">DISCORD</a>
        <a href="https://t.me/Ketoand" class="btn">TELEGRAM</a>

        <p class="telegram-user">@Ketoand</p>
    </div>

</body>
</html>
