<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto Startpage v2</title>
    <style>
        /* --- ESTILO GENERAL --- */
        body {
            background-image: url('https://i.imgur.com/MkEjw6u.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Botones a un lado, Info al otro */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* --- CONTENEDOR DE BOTONES (IZQUIERDA) --- */
        .buttons-panel {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 300px;
            margin-left: 80px; /* Un poco más a la izquierda como pediste */
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        .btn {
            display: block;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffffff;
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
            transform: scaleX(1.05);
        }

        /* --- CONTENEDOR DERECHO (INFO + GIF) --- */
        .right-container {
            position: relative;
            z-index: 1;
            margin-right: 0; /* Pegado al borde derecho */
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alinea el círculo y el cuadro a la derecha */
        }

        /* --- CUADRO DE INFO CON BRILLO Y BLUR --- */
        .info-panel {
            background-color: #000;
            border: 2px solid #ffffff;
            padding: 40px 30px;
            width: 480px; /* Un poquito más ancho para tu nuevo texto */
            height: 75vh;
            box-sizing: border-box;
            /* Efecto brillante y blur solicitado */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* --- EL CÍRCULO GIF (ARRIBA DEL CUADRO) --- */
        .circular-gif-outer {
            width: 110px;
            height: 110px;
            background-color: #000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px white;
            margin-bottom: 20px; /* Espacio antes del cuadro */
            margin-right: 40px; /* Alineación visual */
        }

        .circular-gif-outer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- TEXTO BLANCO Y SEPARADO --- */
        .text-block {
            font-size: 1rem;
            line-height: 1.8;
            color: #ffffff; /* Texto blanco
